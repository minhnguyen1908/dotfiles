# ==========================================================================
# CENTRALIZED TMUX ENGINE ARCHITECTURE
# ==========================================================================

# --- Operational Environment Controls ---
set-option -g status-position top     # Move status bar to top layout to mirror code layouts
set -g base-index 1                   # Start window index counter at 1 instead of 0 for keyboard comfort
setw -g pane-base-index 1             # Match pane numbering sequence to start at index 1
setw -g mode-keys vi                  # Enable native Vim layout navigation inside copy modes
set -g detach-on-destroy off          # Prevent tmux from quitting when a workspace session is terminated

# --- Core Keyboard Mappings ---
bind-key -T copy-mode-vi v send-keys -X begin-selection # Replicate Vim visual selection anchors
bind-key x kill-pane                                    # Instantly drop panes without the tedious confirmation modal
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!" # Quick-reload orchestration setup

# ==========================================================================
# [[ TMUX PLUGIN MANAGER MATRIX ]]
# ==========================================================================
# Grouping all plugin specifications cleanly before executing runtime calls

set -g @plugin 'tmux-plugins/tpm'              # Assert base plugin manager tracking
set -g @plugin 'tmux-plugins/tmux-sensible'    # Establishes clean POSIX defaults and fixing response lags
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless C-h/j/k/l splits transit between Neovim and Tmux
set -g @plugin 'joshmedeski/sesh'              # Enable intelligent workspace management pipelines

# --- Theme Configuration ---
set -g @plugin 'catppuccin/tmux'               # Beautiful status-line aesthetics
set -g @catppuccin_flavour 'macchiato'         # Match color space directly to Ghostty Macchiato profile
set -g @catppuccin_window_status_style 'rounded' # Soft rounded edge boundaries for tab modules

# --- [NEW LOGICAL POSITION] Session Preservation Array ---
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Engine that captures/saves multi-pane configurations
set -g @plugin 'tmux-plugins/tmux-continuum'   # Automated background save scheduling daemon
set -g @resurrect-capture-pane-contents 'on'   # Force save engine to serialize text buffer contexts
set -g @continuum-restore 'on'                 # Auto-restore state silently upon terminal boot

# ==========================================================================
# [[ PLUGINS RUNTIME INITIALIZATION ]]
# ==========================================================================

# Execute theme components first after registering variables
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status-line geometry optimization settings
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ==========================================================================
# [[ INTELLIGENT WORKSPACE RUNNERS ]]
# ==========================================================================

# Sesh CLI layout binder matching keyboard-centric fzf workflows
bind-key "T" run-shell "sesh connect \"$( \
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡ ' \
    --header ' ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡ )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟 )+reload(sesh list -it)' \
    --bind 'ctrl-g:change-prompt(⚙️ )+reload(sesh list -ic)' \
    --bind 'ctrl-x:change-prompt(📁 )+reload(sesh list -iz)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2.. })+change-prompt(⚡ )+reload(sesh list --icons)' \
    --bind 'ctrl-f:change-prompt(🔎 )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
)\""

# --------------------------------------------------------------------------
# CRITICAL CRITERIA: This runner command must stay at the absolute bottom!
# --------------------------------------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'
